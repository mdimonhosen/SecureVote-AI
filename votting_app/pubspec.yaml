name: votting_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 Backend
  supabase_flutter: ^2.0.0

  # 🤖 AI / ML
  google_mlkit_face_detection: ^0.10.0
  tflite_flutter: ^0.10.1

  # 📷 Camera
  camera: ^0.10.5+5
  image: ^4.0.17

  # 📁 File handling (FIXED)
  file_picker: ^8.0.0

  # 🧠 Utils
  intl: ^0.18.1
  provider: ^6.0.5
  google_fonts: ^6.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.1
  permission_handler: ^11.0.1

  # 📊 UI / Charts
  fl_chart: ^0.63.0
  flutter_spinkit: ^5.2.0

  # 📄 Data
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/lang/
    - assets/models/